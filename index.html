<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星幕塔罗</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1116;
      --panel: rgba(18, 24, 31, 0.84);
      --panel-strong: rgba(23, 31, 40, 0.96);
      --line: rgba(236, 214, 151, 0.22);
      --text: #f3ead8;
      --muted: #b7ad9c;
      --gold: #e3c879;
      --teal: #68d5c6;
      --rose: #d985a2;
      --ink: #171b22;
      --shadow: rgba(0, 0, 0, 0.34);
      --card-w: clamp(164px, 17vw, 188px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(104, 213, 198, 0.16), transparent 28rem),
        radial-gradient(circle at 84% 10%, rgba(217, 133, 162, 0.13), transparent 24rem),
        linear-gradient(135deg, rgba(227, 200, 121, 0.08), transparent 28rem),
        #0d1116;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(243, 234, 216, 0.5) 0 1px, transparent 1.6px),
        linear-gradient(115deg, transparent 0 46%, rgba(227, 200, 121, 0.08) 47%, transparent 48% 100%);
      background-size: 92px 92px, 100% 100%;
      opacity: 0.28;
      mask-image: linear-gradient(to bottom, #000, transparent 82%);
    }

    .sky-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.68;
      mix-blend-mode: screen;
    }

    .cursor-aura {
      position: fixed;
      left: var(--aura-x, -240px);
      top: var(--aura-y, -240px);
      z-index: 1;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, rgba(104, 213, 198, 0.18), transparent 34%),
        radial-gradient(circle, rgba(227, 200, 121, 0.14), transparent 56%);
      filter: blur(4px);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    body.has-pointer .cursor-aura {
      opacity: 1;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      position: relative;
      z-index: 2;
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 24px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.82fr) minmax(320px, 1.18fr);
      gap: 20px;
      align-items: start;
    }

    .intro,
    .reading-panel,
    .result-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .intro::after,
    .reading-panel::after,
    .result-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 0 38%, rgba(255, 255, 255, 0.08) 48%, transparent 58% 100%);
      transform: translateX(-130%);
      opacity: 0;
    }

    .intro:hover::after,
    .reading-panel:hover::after,
    .result-panel.is-visible::after {
      animation: panelSweep 1200ms ease;
    }

    body.is-ritual .reading-panel {
      border-color: rgba(104, 213, 198, 0.48);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.44),
        0 0 52px rgba(104, 213, 198, 0.12);
    }

    .intro {
      min-height: calc(100vh - 64px);
      padding: clamp(20px, 4vw, 38px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 30px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(227, 200, 121, 0.45);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(227, 200, 121, 0.16), rgba(104, 213, 198, 0.08)),
        rgba(255, 255, 255, 0.03);
      flex: 0 0 auto;
      animation: markPulse 4.8s ease-in-out infinite;
    }

    .brand-mark svg {
      width: 36px;
      height: 36px;
      transform-origin: center;
      animation: sigilDrift 20s linear infinite;
    }

    .brand-title {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0;
      color: var(--gold);
    }

    .brand-headline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .exclusive-tag {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      max-width: 100%;
      overflow: hidden;
      border: 1px solid rgba(227, 200, 121, 0.54);
      border-radius: 6px;
      padding: 2px 9px;
      color: #1b1711;
      background:
        linear-gradient(135deg, rgba(255, 246, 203, 0.96), rgba(227, 200, 121, 0.94)),
        var(--gold);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 0 24px rgba(227, 200, 121, 0.18);
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
      animation: exclusivePulse 3.6s ease-in-out infinite;
    }

    .exclusive-tag::after {
      content: "";
      position: absolute;
      inset: -30% auto -30% -45%;
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
      transform: skewX(-18deg);
      animation: exclusiveSweep 3.2s ease-in-out infinite;
    }

    .brand-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.8rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px 0 0;
      max-width: 34rem;
      color: #d9cebb;
      line-height: 1.8;
      font-size: 1rem;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(227, 200, 121, 0.2);
      border-radius: 8px;
      background: rgba(6, 8, 12, 0.42);
    }

    .mode-button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .mode-button[aria-selected="true"] {
      color: var(--ink);
      background: linear-gradient(135deg, var(--gold), #fff0ba);
      box-shadow: 0 8px 24px rgba(227, 200, 121, 0.18);
    }

    .mode-button:focus-visible,
    .primary-button:focus-visible,
    .secondary-button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 3px;
    }

    .ritual-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .ritual-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      color: #d7cab4;
      line-height: 1.7;
    }

    .ritual-list span {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(104, 213, 198, 0.35);
      border-radius: 50%;
      color: var(--teal);
      font-size: 0.78rem;
    }

    .reading-panel {
      padding: clamp(18px, 3vw, 30px);
    }

    .control-bar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(227, 200, 121, 0.22);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      background: rgba(5, 7, 10, 0.55);
    }

    input::placeholder {
      color: rgba(183, 173, 156, 0.72);
    }

    .primary-button,
    .secondary-button {
      position: relative;
      overflow: hidden;
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 0 16px;
      white-space: nowrap;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    .primary-button::after {
      content: "";
      position: absolute;
      inset: -20% auto -20% -45%;
      width: 34%;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.62), transparent);
      transform: skewX(-18deg) translateX(-160%);
    }

    .primary-button:hover::after,
    .primary-button.is-casting::after {
      animation: buttonSweep 1050ms ease infinite;
    }

    .primary-button {
      color: var(--ink);
      background: linear-gradient(135deg, var(--gold), #fff1be);
      box-shadow: 0 12px 28px rgba(227, 200, 121, 0.16);
    }

    .secondary-button {
      color: var(--text);
      border-color: rgba(104, 213, 198, 0.28);
      background: rgba(104, 213, 198, 0.09);
    }

    .primary-button:hover,
    .secondary-button:hover,
    .mode-button:hover {
      transform: translateY(-1px);
    }

    .primary-button:disabled,
    .secondary-button:disabled {
      cursor: wait;
      opacity: 0.64;
      transform: none;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin: 18px 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status-row strong {
      color: var(--teal);
      font-weight: 500;
    }

    .spread {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, var(--card-w)));
      justify-content: center;
      gap: clamp(12px, 2.5vw, 22px);
      min-height: 330px;
      align-items: start;
    }

    .spread::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 51%;
      width: min(560px, 84%);
      aspect-ratio: 1;
      border-radius: 50%;
      pointer-events: none;
      background:
        conic-gradient(from 0deg, transparent, rgba(104, 213, 198, 0.24), transparent 28%, rgba(227, 200, 121, 0.22), transparent 58%, rgba(217, 133, 162, 0.18), transparent),
        radial-gradient(circle, transparent 0 48%, rgba(227, 200, 121, 0.16) 49%, transparent 51%);
      opacity: 0.34;
      transform: translate(-50%, -50%);
      animation: slowSpin 26s linear infinite;
    }

    .spread.is-shuffling::before {
      opacity: 0.72;
      animation-duration: 5s;
    }

    .spread.single {
      grid-template-columns: minmax(0, var(--card-w));
    }

    .spread.single .tarot-card {
      width: min(66vw, 210px);
    }

    .card-slot {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      justify-items: center;
      perspective: 900px;
    }

    .slot-label {
      color: var(--gold);
      font-size: 0.9rem;
    }

    .tarot-card {
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      --lift: 0px;
      position: relative;
      width: var(--card-w);
      aspect-ratio: 2 / 3;
      transform-style: preserve-3d;
      transform: translateY(var(--lift)) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
      transition: transform 760ms cubic-bezier(0.2, 0.7, 0.2, 1), filter 240ms ease;
      filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.34));
      will-change: transform, filter;
    }

    .tarot-card:hover {
      --lift: -8px;
      filter:
        drop-shadow(0 30px 38px rgba(0, 0, 0, 0.4))
        drop-shadow(0 0 18px rgba(227, 200, 121, 0.18));
    }

    .tarot-card.is-revealed {
      transform: translateY(var(--lift)) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
    }

    .tarot-card.is-dealing {
      animation: deal 560ms ease;
    }

    .spread.is-shuffling .tarot-card {
      animation: shuffleOrbit 760ms ease-in-out infinite;
      animation-delay: calc(var(--shuffle-index, 0) * -120ms);
      filter:
        drop-shadow(0 28px 42px rgba(0, 0, 0, 0.46))
        drop-shadow(0 0 24px rgba(104, 213, 198, 0.18));
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      overflow: hidden;
      backface-visibility: hidden;
      border: 1px solid rgba(227, 200, 121, 0.35);
      transition: transform 760ms cubic-bezier(0.2, 0.7, 0.2, 1), opacity 260ms ease;
    }

    .card-back {
      display: grid;
      place-items: center;
      opacity: 1;
      background:
        radial-gradient(circle at center, rgba(227, 200, 121, 0.22), transparent 30%),
        linear-gradient(135deg, rgba(104, 213, 198, 0.18), transparent 42%),
        linear-gradient(210deg, rgba(217, 133, 162, 0.17), transparent 46%),
        #131922;
      background-size: 140% 140%;
      animation: cardBackGlow 5s ease-in-out infinite;
    }

    .tarot-card.is-revealed .card-back {
      opacity: 0;
      pointer-events: none;
      transform: rotateY(-180deg);
    }

    .card-back::before,
    .card-back::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(243, 234, 216, 0.22);
      border-radius: 6px;
    }

    .card-back::after {
      inset: 25px;
      border-color: rgba(104, 213, 198, 0.22);
      transform: rotate(45deg);
    }

    .back-sigil {
      position: relative;
      width: 52%;
      aspect-ratio: 1;
      border: 1px solid rgba(227, 200, 121, 0.44);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      animation: sigilSpin 16s linear infinite;
    }

    .back-sigil::before {
      content: "";
      width: 44%;
      height: 44%;
      border: 1px solid rgba(104, 213, 198, 0.58);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(104, 213, 198, 0.18);
    }

    .card-front {
      transform: rotateY(180deg);
      opacity: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 13px;
      background:
        radial-gradient(circle at 50% 36%, rgba(var(--accent-rgb), 0.2), transparent 45%),
        linear-gradient(180deg, #f3ead8, #d4c4a4);
      color: #1d1a19;
      box-shadow: inset 0 0 30px rgba(var(--accent-rgb), 0.18);
    }

    .tarot-card.is-revealed .card-front {
      opacity: 1;
      transform: rotateY(0deg);
    }

    .card-front.reversed {
      background:
        radial-gradient(circle at 50% 36%, rgba(var(--accent-rgb), 0.16), transparent 45%),
        linear-gradient(180deg, #cab999, #efe2c6);
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(29, 26, 25, 0.78);
      font-size: 0.76rem;
    }

    .card-art {
      align-self: center;
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .card-art svg {
      width: 92%;
      height: 92%;
      overflow: visible;
      filter: drop-shadow(0 8px 12px rgba(29, 26, 25, 0.14));
    }

    .tarot-card.is-revealed .card-art svg {
      animation: glyphWake 900ms ease both;
    }

    .card-name {
      margin: 0;
      font-size: clamp(1rem, 1.9vw, 1.35rem);
      line-height: 1.2;
      text-align: center;
    }

    .orientation {
      margin-top: 6px;
      text-align: center;
      color: rgba(29, 26, 25, 0.7);
      font-size: 0.8rem;
    }

    .result-panel {
      margin-top: 18px;
      padding: clamp(18px, 3vw, 26px);
    }

    .result-panel.is-visible {
      animation: resultRise 560ms cubic-bezier(0.18, 0.84, 0.28, 1) both;
    }

    .result-panel[hidden] {
      display: none;
    }

    .result-panel h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      letter-spacing: 0;
    }

    .summary-copy {
      margin: 0 0 18px;
      color: #d7cab4;
      line-height: 1.8;
    }

    .reading-list {
      display: grid;
      gap: 12px;
    }

    .reading-item {
      border: 1px solid rgba(227, 200, 121, 0.18);
      border-radius: 8px;
      padding: 14px;
      background: rgba(7, 9, 13, 0.35);
      animation: itemReveal 520ms ease both;
    }

    .reading-item:nth-child(2) {
      animation-delay: 80ms;
    }

    .reading-item:nth-child(3) {
      animation-delay: 160ms;
    }

    .spark {
      position: fixed;
      left: var(--spark-x);
      top: var(--spark-y);
      z-index: 5;
      width: var(--spark-size, 6px);
      height: var(--spark-size, 6px);
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.96), rgba(var(--spark-rgb), 0.84) 45%, transparent 72%);
      box-shadow: 0 0 18px rgba(var(--spark-rgb), 0.6);
      transform: translate(-50%, -50%) scale(1);
      animation: sparkBurst 820ms ease-out forwards;
    }

    .reading-item h3 {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 6px;
      padding: 2px 8px;
      color: #10151a;
      background: var(--gold);
      font-size: 0.76rem;
      font-weight: 600;
    }

    .keywords {
      margin: 0 0 8px;
      color: var(--teal);
      font-size: 0.9rem;
    }

    .reading-item p {
      margin: 0;
      color: #d9cebb;
      line-height: 1.75;
    }

    .reading-item p + p {
      margin-top: 8px;
    }

    .disclaimer {
      margin: 18px 0 0;
      color: rgba(243, 234, 216, 0.62);
      line-height: 1.7;
      font-size: 0.86rem;
    }

    @keyframes deal {
      from {
        opacity: 0;
        transform: translateY(22px) rotateZ(-3deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotateZ(0);
      }
    }

    @keyframes slowSpin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes panelSweep {
      0% {
        opacity: 0;
        transform: translateX(-130%);
      }
      30% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(130%);
      }
    }

    @keyframes buttonSweep {
      to {
        transform: skewX(-18deg) translateX(520%);
      }
    }

    @keyframes markPulse {
      0%, 100% {
        box-shadow: 0 0 0 rgba(227, 200, 121, 0);
      }
      50% {
        box-shadow: 0 0 28px rgba(227, 200, 121, 0.18);
      }
    }

    @keyframes exclusivePulse {
      0%, 100% {
        transform: translateY(0);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.08) inset,
          0 0 18px rgba(227, 200, 121, 0.14);
      }
      50% {
        transform: translateY(-1px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.12) inset,
          0 0 30px rgba(227, 200, 121, 0.28);
      }
    }

    @keyframes exclusiveSweep {
      0%, 38% {
        transform: skewX(-18deg) translateX(-180%);
      }
      68%, 100% {
        transform: skewX(-18deg) translateX(520%);
      }
    }

    @keyframes sigilDrift {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes sigilSpin {
      to {
        transform: rotate(-360deg);
      }
    }

    @keyframes cardBackGlow {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes shuffleOrbit {
      0%, 100% {
        transform: translateY(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      }
      25% {
        transform: translateY(-12px) rotateX(6deg) rotateY(-12deg) rotateZ(-4deg);
      }
      50% {
        transform: translateY(4px) rotateX(-4deg) rotateY(12deg) rotateZ(5deg);
      }
      75% {
        transform: translateY(-8px) rotateX(5deg) rotateY(8deg) rotateZ(-2deg);
      }
    }

    @keyframes glyphWake {
      from {
        opacity: 0.25;
        transform: scale(0.82) rotate(-8deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes resultRise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes itemReveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sparkBurst {
      to {
        opacity: 0;
        transform: translate(calc(-50% + var(--spark-dx)), calc(-50% + var(--spark-dy))) scale(0.18);
      }
    }

    @media (max-width: 900px) {
      .shell {
        width: min(100% - 24px, 720px);
        padding-top: 12px;
      }

      .app-grid {
        grid-template-columns: 1fr;
      }

      .intro {
        min-height: auto;
      }

      .control-bar {

        if (window.innerWidth < 760) return;
        const card = event.target.closest(".tarot-card");
        if (!card || !spreadEl.contains(card)) return;

        const rect = card.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;
        card.style.setProperty("--tilt-x", `${(-y * 10).toFixed(2)}deg`);
        card.style.setProperty("--tilt-y", `${(x * 12).toFixed(2)}deg`);
        card.style.setProperty("--lift", "-10px");
      }, { passive: true });

      spreadEl.addEventListener("pointerout", (event) => {
        const card = event.target.closest(".tarot-card");
        if (card && !card.contains(event.relatedTarget)) {
          resetCardTilt(card);
        }
      });

      spreadEl.addEventListener("pointerleave", () => {
        spreadEl.querySelectorAll(".tarot-card").forEach(resetCardTilt);
      });

        height = window.innerHeight;

          }

          if (pointer.active) {
            const pointerDistance = Math.hypot(star.x - pointer.x, star.y - pointer.y);
            if (pointerDistance < 150) {
              drawLine(star, pointer, (1 - pointerDistance / 150) * 0.28);
            }
          }
        }

        requestAnimationFrame(tick);
      }

      window.addEventListener("resize", resize, { passive: true });
      window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
      }, { passive: true });
      window.addEventListener("pointerleave", () => {
        pointer.active = false;
      });

      resize();
      requestAnimationFrame(tick);
    }

    function createSparkBurst(card, deckIndex) {
      if (prefersReducedMotion.matches) return;
      const rect = card.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      const accent = accents[deckIndex % accents.length];
      const total = window.innerWidth < 680 ? 12 : 20;

      for (let i = 0; i < total; i += 1) {
        const spark = document.createElement("span");
        const angle = (Math.PI * 2 * i) / total + Math.random() * 0.35;
        const distance = 44 + Math.random() * 70;
        const size = 3 + Math.random() * 5;
        spark.className = "spark";
        spark.style.setProperty("--spark-x", `${x}px`);
        spark.style.setProperty("--spark-y", `${y}px`);
        spark.style.setProperty("--spark-rgb", accent);
        spark.style.setProperty("--spark-size", `${size}px`);
        spark.style.setProperty("--spark-dx", `${Math.cos(angle) * distance}px`);
        spark.style.setProperty("--spark-dy", `${Math.sin(angle) * distance}px`);
        document.body.appendChild(spark);
        window.setTimeout(() => spark.remove(), 900);
      }
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return hash >>> 0;
    }

    function getDateKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function randomInt(max) {
      if (window.crypto && window.crypto.getRandomValues) {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return array[0] % max;
      }
      return Math.floor(Math.random() * max);
    }

    function getReading(forceRandom = false) {
      const count = state.mode === "daily" ? 1 : 3;
      const pool = [...deck];
      const reading = [];

      if (state.mode === "daily" && !forceRandom) {
        const seed = hashString(`daily-${getDateKey()}`);
        const cardIndex = seed % deck.length;
        const reversed = hashString(`orientation-${getDateKey()}`) % 2 === 0;
        return [{ card: deck[cardIndex], reversed, position: positions.daily[0], deckIndex: cardIndex }];
      }

      for (let i = 0; i < count; i += 1) {
        const poolIndex = randomInt(pool.length);
        const card = pool.splice(poolIndex, 1)[0];
        reading.push({
          card,
          reversed: randomInt(2) === 0,
          position: positions[state.mode][i],
          deckIndex: deck.findIndex((item) => item.id === card.id)
        });
      }

      return reading;
    }

    function cardSymbolSvg(index, accent) {
      const ring = 22 + (index % 4) * 3;
      const tilt = (index * 17) % 90;
      const small = 7 + (index % 5);
      const pathShift = 11 + (index % 7);

      return `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <radialGradient id="glow-${index}" cx="50%" cy="45%" r="55%">
              <stop offset="0%" stop-color="rgba(${accent}, 0.86)"/>
              <stop offset="72%" stop-color="rgba(${accent}, 0.10)"/>
              <stop offset="100%" stop-color="rgba(${accent}, 0)"/>
            </radialGradient>
          </defs>
          <circle cx="60" cy="60" r="46" fill="url(#glow-${index})"/>
          <circle cx="60" cy="60" r="${ring}" fill="none" stroke="rgba(29, 26, 25, 0.62)" stroke-width="1.5"/>
          <circle cx="60" cy="60" r="42" fill="none" stroke="rgba(${accent}, 0.9)" stroke-width="2"/>
          <path d="M60 18 L68 ${52 - pathShift / 3} L102 60 L68 ${68 + pathShift / 3} L60 102 L52 ${68 + pathShift / 3} L18 60 L52 ${52 - pathShift / 3} Z" fill="none" stroke="rgba(29, 26, 25, 0.7)" stroke-width="1.8"/>
          <g transform="rotate(${tilt} 60 60)">
            <path d="M60 ${28 - small / 2} C82 40 82 80 60 ${92 + small / 2} C38 80 38 40 60 ${28 - small / 2}Z" fill="none" stroke="rgba(29, 26, 25, 0.64)" stroke-width="1.6"/>
            <line x1="60" y1="20" x2="60" y2="100" stroke="rgba(${accent}, 0.94)" stroke-width="2"/>
            <line x1="20" y1="60" x2="100" y2="60" stroke="rgba(${accent}, 0.64)" stroke-width="1.5"/>
          </g>
          <circle cx="60" cy="60" r="${small}" fill="rgba(29, 26, 25, 0.78)"/>
        </svg>
      `;
    }

    function renderSpread(reading = []) {
      const labels = positions[state.mode];
      spreadEl.className = `spread${state.mode === "daily" ? " single" : ""}`;
      spreadEl.innerHTML = labels.map((label, index) => {
        const item = reading[index];
        const card = item?.card;
        const accent = accents[(item?.deckIndex ?? index) % accents.length];
        const style = `--accent-rgb: ${accent}`;
        const front = card ? `
          <div class="card-face card-front ${item.reversed ? "reversed" : ""}" style="${style}">
            <div class="card-meta"><span>${card.arcana}</span><span>${String(item.deckIndex).padStart(2, "0")}</span></div>
            <div class="card-art">${cardSymbolSvg(item.deckIndex, accent)}</div>
            <div>
              <h3 class="card-name">${card.name}</h3>
              <div class="orientation">${item.reversed ? "逆位" : "正位"}</div>
            </div>
          </div>
        ` : `
          <div class="card-face card-front" style="${style}">
            <div class="card-meta"><span>星幕</span><span>?</span></div>
            <div class="card-art">${cardSymbolSvg(index, accent)}</div>
            <div>
              <h3 class="card-name">等待抽牌</h3>
              <div class="orientation">未翻开</div>
            </div>
          </div>
        `;

        return `
          <article class="card-slot">
            <div class="slot-label">${label}</div>
            <div class="tarot-card ${card ? "is-dealing" : ""}" data-card-index="${index}">
              <div class="card-face card-back">
                <div class="back-sigil"></div>
              </div>
              ${front}
            </div>
          </article>
        `;
      }).join("");
    }

    function renderResult(reading) {
      const topic = intentionInput.value.trim() || (state.mode === "daily" ? "今天的状态" : "这个问题");
      const names = reading.map((item) => `${item.card.name}${item.reversed ? "逆位" : "正位"}`).join("、");
      summaryCopyEl.textContent = state.mode === "daily"
        ? `围绕「${topic}」，今天出现的是 ${names}。它提醒你先照顾内在状态，再决定下一步。`
        : `围绕「${topic}」，这组三牌从来处、当下和建议三个角度展开。请把它们当作线索，而不是结论。`;

      readingListEl.innerHTML = reading.map((item) => {
        const meaning = item.reversed ? item.card.reversedMeaning : item.card.uprightMeaning;
        return `
          <article class="reading-item">
            <h3><span>${item.position}</span><span class="badge">${item.card.name} · ${item.reversed ? "逆位" : "正位"}</span></h3>
            <p class="keywords">${item.card.keywords.join(" / ")}</p>
            <p>${meaning}</p>
            <p><strong>行动建议：</strong>${item.card.advice}</p>
          </article>
        `;
      }).join("");

      resultPanelEl.hidden = false;
    }

    function setMode(mode) {
      state.mode = mode;
      document.querySelectorAll(".mode-button").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.mode === mode));
      });
      modeHint.innerHTML = mode === "daily"
        ? "<strong>每日一牌</strong> 会基于今天生成一张稳定牌面。"
        : "<strong>三牌占卜</strong> 会抽出不重复的过去、现在、建议。";
      resultPanelEl.hidden = true;
      resultPanelEl.classList.remove("is-visible");
      state.lastReading = [];
      renderSpread();
    }

    async function drawCards(forceRandom = false) {
      if (state.isDrawing) return;
      state.isDrawing = true;
      drawButton.disabled = true;
      redrawButton.disabled = true;
      resultPanelEl.hidden = true;
      resultPanelEl.classList.remove("is-visible");
      document.body.classList.add("is-ritual");
      drawButton.classList.add("is-casting");
      drawButton.textContent = "星幕洗牌中...";

      renderSpread();
      spreadEl.classList.add("is-shuffling");
      spreadEl.querySelectorAll(".tarot-card").forEach((card, index) => {
        card.style.setProperty("--shuffle-index", index);
      });

      await sleep(prefersReducedMotion.matches ? 120 : 820);
      const reading = getReading(forceRandom);
      state.lastReading = reading;
      renderSpread(reading);
      spreadEl.classList.remove("is-shuffling");

      const cards = [...spreadEl.querySelectorAll(".tarot-card")];
      cards.forEach((card) => card.classList.remove("is-revealed"));

      await sleep(prefersReducedMotion.matches ? 40 : 320);
      cards.forEach((card) => card.classList.remove("is-dealing"));
      for (let i = 0; i < cards.length; i += 1) {
        await sleep(prefersReducedMotion.matches ? 40 : 300);
        cards[i].classList.add("is-revealed");
        createSparkBurst(cards[i], reading[i].deckIndex);
      }

      await sleep(prefersReducedMotion.matches ? 80 : 380);
      renderResult(reading);
      resultPanelEl.classList.add("is-visible");
      drawButton.textContent = "洗牌并抽牌";
      drawButton.classList.remove("is-casting");
      document.body.classList.remove("is-ritual");
      drawButton.disabled = false;
      redrawButton.disabled = false;
      state.isDrawing = false;
    }

    document.querySelectorAll(".mode-button").forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    drawButton.addEventListener("click", () => drawCards(false));
    redrawButton.addEventListener("click", () => drawCards(true));

    initCursorAura();
    initSkyCanvas();
    initCardTilt();
    renderSpread();
  </script>
</body>
</html>
